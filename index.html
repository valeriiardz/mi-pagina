<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi primera página</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

h1{
color:#2c3e50;
}

.card{
background:white;
padding:20px;
margin:40px auto;
width:300px;
border-radius:10px;
box-shadow:0px 5px 10px rgba(0,0,0,0.2);
}

button{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Mi Página Web</h1>

<div class="card">
<p>Hola, esta es mi primera página web publicada en internet.</p>

<button onclick="alert('Hola visitante 👋')">
Haz clic
</button>
</div>

</body>
</html>
